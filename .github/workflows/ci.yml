name: CI
on: push

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        cache: 'pnpm'
        node-version: ${{ matrix.node-version }}
    - run: pnpm i
  test:
    name: '🧪 Vitest'
    needs: [install]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        cache: 'pnpm'
        node-version: ${{ matrix.node-version }}
    - run: pnpm i
    - run: pnpm test
  build:
    name: '🧰 Build'
    needs: [install]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        cache: 'pnpm'
        node-version: ${{ matrix.node-version }}
    - run: pnpm i
    - run: pnpm build
  ts:
    name: '🔍 TypeScript'
    needs: [install]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        cache: 'pnpm'
        node-version: ${{ matrix.node-version }}
    - run: pnpm i
    - run: pnpm lint
  lint:
    name: '🔍 ESLint'
    needs: [install]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        cache: 'pnpm'
        node-version: ${{ matrix.node-version }}
    - run: pnpm i
    - run: pnpm lint
    
    